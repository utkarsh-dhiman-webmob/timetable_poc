{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="auth-card card shadow-lg">

  <div class="auth-card-brand" style="background: linear-gradient(160deg, #28a745 0%, #1a7a31 100%);">
    <div class="brand-icon" style="background: rgba(255,255,255,0.2);">
      <i class="fas fa-check-circle fa-2x text-white"></i>
    </div>
    <h2 class="text-white fw-bold mt-3 mb-0">Done!</h2>
    <p class="text-white-50 small mb-0">Password updated</p>
    <div class="brand-decoration mt-4">
      <i class="fas fa-graduation-cap fa-2x text-white-50 mb-2 d-block"></i>
      <p class="text-white-50 small">TTGS<br>Timetable Generation System</p>
    </div>
  </div>

  <div class="auth-card-form d-flex flex-column align-items-center justify-content-center text-center">
    <div class="mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-success bg-opacity-10"
           style="width:90px; height:90px;">
        <i class="fas fa-lock-open fa-2x text-success"></i>
      </div>
    </div>

    <h3 class="fw-bold text-dark">Password Reset!</h3>
    <p class="text-muted mt-2 mb-4">
      Your password has been set successfully.<br>
      You can now log in with your new password.
    </p>

    <a href="{% url 'login' %}" class="btn btn-primary btn-lg fw-semibold px-5">
      <i class="fas fa-sign-in-alt me-2"></i>Log In Now
    </a>
  </div>

</div>
{% endblock %}
